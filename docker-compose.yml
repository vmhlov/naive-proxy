# Compose file for running NaïveProxy server (Caddy + forwardproxy@naive).
# `version:` is intentionally omitted: Compose v2+ ignores it and emits a warning.

services:
  naive-proxy:
    image: pocat/naiveproxy:latest
    # Alternative: build a fully self-contained image from the included
    # Dockerfile (xcaddy + Caddy + forwardproxy@naive). Comment `image:`
    # above and uncomment the line below.
    # build: .
    container_name: naive-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # pocat/naiveproxy reads the config path from the PATH env var
      # (its CMD is `caddy run --config ${PATH}`), so we override PATH
      # with the in-container Caddyfile location.
      PATH: /etc/naiveproxy/Caddyfile
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - ./Caddyfile:/etc/naiveproxy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/caddy version >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
